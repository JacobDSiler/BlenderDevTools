<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blender Dev Tracker</title>
<style>
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #30363d;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --accent:    #58a6ff;
    --green:     #3fb950;
    --red:       #f85149;
    --yellow:    #d29922;
    --orange:    #e3b341;
    --radius:    8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Header ──────────────────────────────────────────── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 {
    font-size: 1.25rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header h1 .icon { font-size: 1.4rem; }
  .header-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 4px;
  }
  .status-dot.connected { background: var(--green); }
  .status-dot.disconnected { background: var(--red); }

  /* ── Summary cards ───────────────────────────────────── */
  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    padding: 20px 24px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }
  .card .value {
    font-size: 1.75rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .card .label {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 2px;
  }
  .card .value.running { color: var(--green); }
  .card .value.accent  { color: var(--accent); }

  /* ── Table ───────────────────────────────────────────── */
  .table-wrap {
    padding: 0 24px 40px;
    max-width: 1200px;
    margin: 0 auto;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
  }
  thead th {
    text-align: left;
    padding: 10px 12px;
    font-weight: 600;
    color: var(--muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
  }
  tbody td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  tbody tr:hover { background: rgba(88, 166, 255, 0.04); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .badge.running {
    background: rgba(63, 185, 80, 0.15);
    color: var(--green);
  }
  .badge.stopped {
    background: rgba(139, 148, 158, 0.15);
    color: var(--muted);
  }

  .elapsed-live { color: var(--green); font-weight: 600; }
  .elapsed-stopped { color: var(--text); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .big { font-size: 2rem; margin-bottom: 8px; }

  /* ── Responsive ──────────────────────────────────────── */
  @media (max-width: 640px) {
    .header { padding: 12px 16px; }
    .summary { padding: 12px 16px; }
    .table-wrap { padding: 0 8px 24px; }
    thead th, tbody td { padding: 8px 6px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span class="icon">&#9881;</span> Blender Dev Tracker</h1>
  <div class="header-meta">
    <span id="machineLabel"></span>
    <span><span class="status-dot" id="connDot"></span><span id="connLabel">Connecting...</span></span>
  </div>
</div>

<div class="summary">
  <div class="card"><div class="value running" id="sumRunning">0</div><div class="label">Running</div></div>
  <div class="card"><div class="value accent"  id="sumTotal">0</div><div class="label">Total Sessions</div></div>
  <div class="card"><div class="value"         id="sumTime">00:00</div><div class="label">Total Time</div></div>
  <div class="card"><div class="value"         id="sumReloads">0</div><div class="label">Total Reloads</div></div>
  <div class="card"><div class="value"         id="sumPurges">0</div><div class="label">Total Purges</div></div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Status</th>
        <th>Session ID</th>
        <th>Machine</th>
        <th>Start Time</th>
        <th>Elapsed</th>
        <th>Reloads</th>
        <th>Purges</th>
        <th>Last Activity</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty-state" id="empty" style="display:none;">
    <div class="big">&#128736;</div>
    <p>No sessions recorded yet.<br>Start the timer in Blender to begin tracking.</p>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
(function() {
  'use strict';

  // ── Firebase config ──────────────────────────────────
  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyDOUHw5trieJgLoJYsz6b0Q1Q9w0Xybf5M",
    authDomain:        "curveslivepro-licensing.firebaseapp.com",
    projectId:         "curveslivepro-licensing",
    storageBucket:     "curveslivepro-licensing.firebasestorage.app",
    messagingSenderId: "582693878762",
    appId:             "1:582693878762:web:c4349259ba3efa59219093"
  };

  // ── Init ─────────────────────────────────────────────
  firebase.initializeApp(FIREBASE_CONFIG);
  const db = firebase.firestore();

  // ── URL params ───────────────────────────────────────
  const params  = new URLSearchParams(window.location.search);
  const machine = params.get('machine') || '';
  if (machine) {
    document.getElementById('machineLabel').textContent = machine;
  }
  // Clean URL
  if (window.location.search) {
    history.replaceState(null, '', window.location.pathname);
  }

  // ── DOM refs ─────────────────────────────────────────
  const $tbody      = document.getElementById('tbody');
  const $empty      = document.getElementById('empty');
  const $connDot    = document.getElementById('connDot');
  const $connLabel  = document.getElementById('connLabel');
  const $sumRunning = document.getElementById('sumRunning');
  const $sumTotal   = document.getElementById('sumTotal');
  const $sumTime    = document.getElementById('sumTime');
  const $sumReloads = document.getElementById('sumReloads');
  const $sumPurges  = document.getElementById('sumPurges');

  // ── Row cache ────────────────────────────────────────
  // Keyed by session doc ID. Each value: { tr, cells: {status, sid, machine, start, elapsed, reloads, purges, activity} }
  const _rowCache = new Map();
  let _sessions   = [];     // current snapshot of session docs
  let _tickerId   = null;

  // ── Helpers ──────────────────────────────────────────

  /** Only assign textContent if changed — avoids DOM thrash */
  function _setText(el, text) {
    if (el.textContent !== text) el.textContent = text;
  }

  /** Format seconds as HH:MM:SS or MM:SS */
  function fmtElapsed(sec) {
    sec = Math.max(0, Math.floor(sec));
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    const mm = String(m).padStart(2, '0');
    const ss = String(s).padStart(2, '0');
    return h ? `${String(h).padStart(2, '0')}:${mm}:${ss}` : `${mm}:${ss}`;
  }

  /** Parse an ISO string or Firestore timestamp to epoch ms */
  function toMs(val) {
    if (!val) return 0;
    if (typeof val === 'string') return new Date(val).getTime() || 0;
    if (val.seconds) return val.seconds * 1000;  // Firestore Timestamp
    if (val.toDate) return val.toDate().getTime();
    return 0;
  }

  /** Reconstruct start_time from session_id (YYYYMMDD_<unix_ts>) */
  function startTimeFromId(sid) {
    if (!sid) return 0;
    const parts = sid.split('_');
    if (parts.length >= 2) {
      const ts = parseInt(parts[1], 10);
      if (!isNaN(ts)) return ts * 1000;
    }
    return 0;
  }

  /** Get the effective start time for a session (handles missing start_time field) */
  function effectiveStartMs(s) {
    const fromField = toMs(s.start_time);
    return fromField || startTimeFromId(s.session_id || s._id);
  }

  /** Compute live elapsed for a session */
  function liveElapsed(s) {
    const elapsed = s.elapsed_seconds || 0;
    if (s.status !== 'running') return elapsed;

    // Running session — add time since last push
    const lastActivity = toMs(s.last_activity_time);
    if (lastActivity) {
      return elapsed + (Date.now() - lastActivity) / 1000;
    }
    // Fallback: time since start
    const startMs = effectiveStartMs(s);
    if (startMs) {
      return (Date.now() - startMs) / 1000;
    }
    return elapsed;
  }

  /** Format a date for display */
  function fmtDate(ms) {
    if (!ms) return '—';
    const d = new Date(ms);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' ' +
           d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  /** Format last activity for display */
  function fmtActivity(s) {
    const act = s.last_activity || '';
    const ts  = toMs(s.last_activity_time);
    if (!act && !ts) return '—';
    const label = act.replace(/_/g, ' ');
    if (!ts) return label;
    const ago = Math.floor((Date.now() - ts) / 1000);
    let agoStr;
    if (ago < 60)        agoStr = `${ago}s ago`;
    else if (ago < 3600) agoStr = `${Math.floor(ago / 60)}m ago`;
    else                 agoStr = `${Math.floor(ago / 3600)}h ago`;
    return label ? `${label} (${agoStr})` : agoStr;
  }

  // ── Render ───────────────────────────────────────────

  function createRow(s) {
    const tr = document.createElement('tr');
    const cells = {};
    const names = ['status', 'sid', 'machine', 'start', 'elapsed', 'reloads', 'purges', 'activity'];
    names.forEach(name => {
      const td = document.createElement('td');
      tr.appendChild(td);
      cells[name] = td;
    });
    return { tr, cells };
  }

  function updateRow(entry, s) {
    const { cells } = entry;
    const isRunning = s.status === 'running';

    // Status badge
    const badgeClass = isRunning ? 'running' : 'stopped';
    const badgeText  = isRunning ? 'Running' : 'Stopped';
    const badgeHtml  = `<span class="badge ${badgeClass}">${badgeText}</span>`;
    if (cells.status.innerHTML !== badgeHtml) cells.status.innerHTML = badgeHtml;

    _setText(cells.sid,      s.session_id || s._id || '—');
    _setText(cells.machine,  s.machine || '—');
    _setText(cells.start,    fmtDate(effectiveStartMs(s)));

    // Elapsed
    const el = liveElapsed(s);
    const elStr = fmtElapsed(el);
    _setText(cells.elapsed, elStr);
    cells.elapsed.className = isRunning ? 'elapsed-live' : 'elapsed-stopped';

    _setText(cells.reloads,  String(s.reloads || 0));
    _setText(cells.purges,   String(s.purges || 0));
    _setText(cells.activity, fmtActivity(s));
  }

  function renderTable() {
    if (_sessions.length === 0) {
      $tbody.style.display = 'none';
      $empty.style.display = '';
      return;
    }
    $tbody.style.display = '';
    $empty.style.display = 'none';

    // Track which IDs are still present
    const activeIds = new Set();

    _sessions.forEach((s, idx) => {
      const id = s._id;
      activeIds.add(id);

      let entry = _rowCache.get(id);
      if (!entry) {
        entry = createRow(s);
        _rowCache.set(id, entry);
      }
      updateRow(entry, s);

      // Insert row in correct position
      const currentRow = $tbody.children[idx];
      if (currentRow !== entry.tr) {
        $tbody.insertBefore(entry.tr, currentRow || null);
      }
    });

    // Remove rows for deleted sessions
    for (const [id, entry] of _rowCache) {
      if (!activeIds.has(id)) {
        entry.tr.remove();
        _rowCache.delete(id);
      }
    }

    // Update summary cards
    let running = 0, totalElapsed = 0, totalReloads = 0, totalPurges = 0;
    _sessions.forEach(s => {
      if (s.status === 'running') running++;
      totalElapsed += liveElapsed(s);
      totalReloads += (s.reloads || 0);
      totalPurges  += (s.purges  || 0);
    });

    _setText($sumRunning, String(running));
    _setText($sumTotal,   String(_sessions.length));
    _setText($sumTime,    fmtElapsed(totalElapsed));
    _setText($sumReloads, String(totalReloads));
    _setText($sumPurges,  String(totalPurges));
  }

  // ── Ticker ───────────────────────────────────────────

  function startTicker() {
    if (_tickerId !== null) return;
    _tickerId = setInterval(renderTable, 1000);
  }

  function stopTicker() {
    if (_tickerId === null) return;
    clearInterval(_tickerId);
    _tickerId = null;
  }

  function manageTicker() {
    const hasRunning = _sessions.some(s => s.status === 'running');
    if (hasRunning) startTicker();
    else            stopTicker();
  }

  // ── Firestore listener ───────────────────────────────

  function setConnected(ok) {
    $connDot.className  = 'status-dot ' + (ok ? 'connected' : 'disconnected');
    $connLabel.textContent = ok ? 'Connected' : 'Disconnected';
  }

  db.collection('sessions')
    .orderBy('start_time', 'desc')
    .limit(200)
    .onSnapshot(
      snapshot => {
        setConnected(true);

        _sessions = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          data._id = doc.id;
          // Ensure start_time exists (reconstruct from ID if missing)
          if (!data.start_time) {
            const ms = startTimeFromId(data.session_id || doc.id);
            if (ms) data.start_time = new Date(ms).toISOString();
          }
          _sessions.push(data);
        });

        renderTable();
        manageTicker();
      },
      err => {
        console.error('[DevTracker] Firestore error:', err);
        setConnected(false);
      }
    );

  // Initial render
  renderTable();

})();
</script>
</body>
</html>
